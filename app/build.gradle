plugins {
    id 'com.android.application'
    id 'com.chaquo.python'
    id 'com.google.gms.google-services'
}

android {
    namespace 'com.mvxgreen.ytdloader'
    compileSdk 36

    defaultConfig {
        applicationId "com.mvxgreen.ytdloader"
        minSdk 26
        targetSdk 36
        versionCode 18
        versionName "2.3.8"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        ndk {
            abiFilters   "arm64-v8a", "x86_64"
        }

        buildConfigField "String", "API_KEY", "\"${API_KEY}\""

        sourceSets{
            main{
                python {
                    srcDirs = ["src/main/python"]
                }
            }
        }

        chaquopy {
            defaultConfig {
                version = "3.13"
                buildPython "C:/Users/maxwe/AppData/Local/Programs/Python/Python313/python.exe"
                pip{
                    options "--upgrade"
                    install "yt_dlp"
                }
            }
        }

        signingConfig signingConfigs.debug

        multiDexEnabled true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    buildFeatures {
        viewBinding true
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // test
    implementation fileTree(dir: "libs", include: ["*.jar"])
    androidTestImplementation 'androidx.test.ext:junit:1.3.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.7.0'
    testImplementation 'junit:junit:4.13.2'

    // android
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.1'
    implementation "com.android.billingclient:billing:8.1.0"

    // web
    implementation 'org.jsoup:jsoup:1.21.2'
    implementation("com.squareup.okhttp3:okhttp:5.3.2")

    // ui
    implementation 'com.squareup.picasso:picasso:2.71828'
    implementation 'com.github.varunest:TheGlowingLoader:1.0.7'
    implementation 'com.github.mancj:MaterialSearchBar:0.8.5'
    implementation 'com.daimajia.numberprogressbar:library:1.4@aar'

    // google
    implementation 'com.google.android.material:material:1.13.0'
    implementation platform('com.google.firebase:firebase-bom:34.6.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.android.gms:play-services-ads:24.8.0'
    implementation("com.google.android.ump:user-messaging-platform:4.0.0")
}
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}